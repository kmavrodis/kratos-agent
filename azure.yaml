# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.25-preview'
name: kratos-agent
metadata:
    template: kratos-agent@0.1.0
services:
    agent-service:
        project: ./src/backend
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../..
    kratos-agent:
        project: ./src/hosted-agent
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            env:
                APM_USE_CASES_ROOT: /app/use-cases
                AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT}
                BLOB_SKILLS_CONTAINER: skills
                BLOB_STORAGE_ENDPOINT: ${AZURE_BLOB_STORAGE_ENDPOINT}
                COSMOS_DB_DATABASE: kratos-agent
                COSMOS_DB_ENDPOINT: ${AZURE_COSMOS_DB_ENDPOINT}
                KEY_VAULT_URI: ${AZURE_KEY_VAULT_URI}
                MODEL_DEPLOYMENT_NAME: ${FOUNDRY_MODEL_DEPLOYMENT}
                OBO_MCP_SERVER_MCP_URL: ${OBO_MCP_SERVER_MCP_URL}
                OBO_MCP_SERVER_NAME: graph-obo
    obo-mcp-server:
        project: ./src/obo-mcp-server
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
    web:
        project: ./src/frontend
        host: staticwebapp
        language: js
        dist: out
        hooks:
            predeploy:
                name: predeploy
                kind: sh
                shell: sh
                run: |
                    # config.json tells the static frontend where the backend API is.
                    # When hosted behind Front Door under a sub-path (NEXT_PUBLIC_BASE_PATH,
                    # e.g. /kratos), the embedded UI calls the backend SAME-ORIGIN at
                    # <basePath>/api/* — Front Door routes /kratos/api/* to the Container
                    # App (stripping the /kratos prefix). This avoids CORS entirely.
                    # In standalone (root) deployments there is no sub-path, so we point
                    # config.json at the backend's own URL (AGENT_SERVICE_URL).
                    BP="$(printf '%s' "${NEXT_PUBLIC_BASE_PATH:-}" | sed 's#/*$##')"
                    if [ -n "$BP" ]; then
                      echo "{\"apiUrl\":\"${BP}\"}" > out/config.json
                      echo "Injected same-origin config.json with apiUrl=${BP} (behind Front Door)"
                    elif [ -n "${AGENT_SERVICE_URL}" ]; then
                      echo "{\"apiUrl\":\"${AGENT_SERVICE_URL}\"}" > out/config.json
                      echo "Injected config.json with apiUrl=${AGENT_SERVICE_URL}"
                    fi
                    # Merge the OBO sign-in config (Entra app + MCP scope) into
                    # config.json so MSAL.js can sign the user in and acquire a
                    # token for the OBO MCP server. Skipped if outputs are unset.
                    if [ -n "${OBO_CLIENT_APP_CLIENT_ID}" ] && [ -n "${OBO_TENANT_ID}" ] && [ -n "${OBO_SERVER_APP_IDENTIFIER_URI}" ]; then
                      [ -f out/config.json ] || echo "{}" > out/config.json
                      SCOPE="${OBO_SERVER_APP_IDENTIFIER_URI}/${OBO_SERVER_APP_SCOPE_VALUE:-access_as_user}"
                      AUTH_JSON="{\"clientId\":\"${OBO_CLIENT_APP_CLIENT_ID}\",\"tenantId\":\"${OBO_TENANT_ID}\",\"mcpScope\":\"${SCOPE}\",\"mcpServerName\":\"${OBO_MCP_SERVER_NAME:-graph-obo}\"}"
                      node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('out/config.json','utf8'));c.auth=JSON.parse(process.argv[1]);fs.writeFileSync('out/config.json',JSON.stringify(c));" "$AUTH_JSON"
                      echo "Merged OBO auth config into config.json (scope=${SCOPE})"
                    fi
                    # Emit a basePath-aware staticwebapp.config.json into out/ so the
                    # SWA EasyAuth 401 redirect + /api/* gating stay inside the mount
                    # path (e.g. /kratos) when hosted behind Front Door. Empty base
                    # path → straight copy (standalone root deployment).
                    if [ -f staticwebapp.config.json ]; then
                      if [ -n "$BP" ]; then
                        sed "s#/.auth/login/aad#${BP}/.auth/login/aad#g; s#\"/api/\*\"#\"${BP}/api/*\"#g" \
                          staticwebapp.config.json > out/staticwebapp.config.json
                        echo "Wrote basePath-aware staticwebapp.config.json (basePath=${BP})"
                      else
                        cp staticwebapp.config.json out/staticwebapp.config.json
                      fi
                    fi
hooks:
    postdeploy:
        name: postdeploy
        kind: sh
        shell: sh
        run: |
            # Grant the Foundry hosted-agent instance identity its least-privilege
            # data-plane roles. This identity is created by `azd ai agent deploy`
            # after provisioning, so Bicep cannot assign its roles — this hook does.
            # Best-effort: never block the rest of postdeploy on it.
            ./hooks/assign-agent-roles.sh || echo "⚠️  Agent role assignment had issues (see above); continuing."
            ./hooks/postdeploy.sh
        interactive: true
    postprovision:
        name: postprovision
        kind: sh
        shell: sh
        run: |
            # The azure.ai.agents extension requires AZURE_TENANT_ID in the azd
            # environment to deploy the hosted agent and auto-assign Foundry User
            # to its identity. azd does not populate this automatically, so set it
            # from the current Azure CLI session if it isn't already present.
            if [ -z "${AZURE_TENANT_ID:-}" ]; then
                TID="$(az account show --query tenantId -o tsv 2>/dev/null || true)"
                if [ -n "$TID" ]; then
                    azd env set AZURE_TENANT_ID "$TID"
                    echo "Set AZURE_TENANT_ID=$TID"
                fi
            fi
            echo "Post-provisioning: configuring services..."
            echo "Deployment complete."
    predeploy:
        name: predeploy
        kind: sh
        shell: sh
        run: |
            BUILD_TS="$(date +%s)"
            azd env set KRATOS_BUILD_TS "$BUILD_TS"
            echo "KRATOS_BUILD_TS=$BUILD_TS (forces new hosted-agent version)"
    preprovision:
        name: preprovision
        kind: sh
        shell: sh
        run: echo "Provisioning Azure resources..."
