# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.25-preview'
name: kratos-agent
metadata:
    template: kratos-agent@0.1.0
services:
    agent-service:
        project: ./src/backend
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
            context: ../..
    # NOTE: service key MUST match the agent name in src/hosted-agent/agent.yaml
    # (kratos-agent) — the azure.ai.agents extension's postdeploy hook looks up
    # agents/<service-key>/versions/<n> using the service key verbatim, so a
    # mismatch produces a scary RED 404 block at the tail of every azd deploy
    # (false alarm, deploy actually succeeded). See README → Troubleshooting.
    kratos-agent:
        project: ./src/hosted-agent
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            env:
                APM_USE_CASES_ROOT: /app/use-cases
                AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT}
                BLOB_SKILLS_CONTAINER: skills
                BLOB_STORAGE_ENDPOINT: ${AZURE_BLOB_STORAGE_ENDPOINT}
                COSMOS_DB_DATABASE: kratos-agent
                COSMOS_DB_ENDPOINT: ${AZURE_COSMOS_DB_ENDPOINT}
                KEY_VAULT_URI: ${AZURE_KEY_VAULT_URI}
                MODEL_DEPLOYMENT_NAME: ${FOUNDRY_MODEL_DEPLOYMENT}
    web:
        project: ./src/frontend
        host: staticwebapp
        language: js
        dist: out
        hooks:
            predeploy:
                name: predeploy
                kind: sh
                shell: sh
                run: |
                    if [ -n "${AGENT_SERVICE_URL}" ]; then
                      echo "{\"apiUrl\":\"${AGENT_SERVICE_URL}\"}" > out/config.json
                      echo "Injected config.json with apiUrl=${AGENT_SERVICE_URL}"
                    fi
hooks:
    postdeploy:
        name: postdeploy
        kind: sh
        shell: sh
        run: ./hooks/postdeploy.sh
        interactive: true
    postprovision:
        name: postprovision
        kind: sh
        shell: sh
        run: |
            echo "Post-provisioning: configuring services..."
            echo "Deployment complete."
    predeploy:
        # Bump KRATOS_BUILD_TS on every azd deploy so Foundry's create_version
        # does NOT deduplicate against the previous version (env vars must differ
        # even when the image digest changes). Lives here at the project scope
        # because the azure.ai.agents extension strips service-level `hooks:`
        # blocks during deploy. Idempotent; harmless when other services deploy.
        # See foundry-hosted-agents skill → "create_version deduplication trap".
        name: predeploy
        kind: sh
        shell: sh
        run: |
            BUILD_TS="$(date +%s)"
            azd env set KRATOS_BUILD_TS "$BUILD_TS"
            echo "KRATOS_BUILD_TS=$BUILD_TS (forces new hosted-agent version)"
    preprovision:
        name: preprovision
        kind: sh
        shell: sh
        run: echo "Provisioning Azure resources..."
