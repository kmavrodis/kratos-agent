name: kratos-agent
metadata:
  template: kratos-agent@0.1.0

services:
  agent-service:
    project: ./src/backend
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: ../..

  web:
    project: ./src/frontend
    language: js
    host: staticwebapp
    dist: out
    hooks:
      predeploy:
        shell: sh
        run: |
          if [ -n "${AGENT_SERVICE_URL}" ]; then
            echo "{\"apiUrl\":\"${AGENT_SERVICE_URL}\"}" > out/config.json
            echo "Injected config.json with apiUrl=${AGENT_SERVICE_URL}"
          fi

hooks:
  preprovision:
    shell: sh
    run: echo "Provisioning Azure resources..."

  postprovision:
    shell: sh
    run: |
      echo "Post-provisioning: configuring services..."
      echo "Deployment complete."

  postdeploy:
    shell: sh
    run: ./hooks/postdeploy.sh
    interactive: true
